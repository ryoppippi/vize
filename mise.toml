[tools]
node = "24.13.0"
pnpm = "10"
rust = "latest"

[env]
_.path = ["~/.cargo/bin"]

# =============================================================================
# Setup
# =============================================================================

[tasks.setup]
description = "Install all dependencies"
run = "vp run --workspace-root setup"

# =============================================================================
# Build
# =============================================================================

[tasks.build]
description = "Build all (native + wasm + npm packages)"
run = "vp run --workspace-root build"

[tasks."build:native"]
alias = "bn"
description = "Build native NAPI bindings"
run = "vp run --workspace-root build:native"

[tasks."build:wasm"]
alias = "bw"
description = "Build WASM bindings for vite-plugin (Node.js)"
run = "vp run --workspace-root build:wasm"

[tasks."build:wasm-web"]
alias = "bww"
description = "Build WASM bindings for browser (playground)"
run = "vp run --workspace-root build:wasm-web"

[tasks."build:vite-plugin"]
alias = "bv"
description = "Build vite-plugin-vize"
run = "vp run --workspace-root build:vite-plugin"

[tasks."build:cli"]
alias = "bc"
description = "Build CLI binary (vize)"
run = "vp run --workspace-root build:cli"

# =============================================================================
# CLI (vize - Vue Compiler)
# =============================================================================
# High-performance Vue SFC compiler with glob pattern matching
# Usage: vize <PATTERNS> [OPTIONS]
#
# OPTIONS:
#   -o, --output <PATH>         Output directory (stdout if not specified)
#   -f, --format <FORMAT>       Output format: js (default), json, stats
#   --ssr                       Enable SSR mode
#   -j, --threads <N>           Number of threads (default: num CPUs)
#   -v, --verbose               Show verbose output
#   --continue-on-error         Continue compilation even on errors

[tasks.cli]
description = "Build and install vize CLI globally (use --debug for dev build)"
run = "vp run --workspace-root cli"

[tasks."cli:help"]
description = "Show vize CLI help"
run = "vp run --workspace-root cli:help"

[tasks."cli:example"]
description = "Example: Compile all .vue files recursively with stats summary"
run = "vp run --workspace-root cli:example"

[tasks."cli:example-json"]
description = "Example: Compile .vue files to JSON with summary stats"
run = "vp run --workspace-root cli:example-json"

[tasks."cli:example-ssr"]
description = "Example: Compile .vue files in SSR mode as JSON with stats"
run = "vp run --workspace-root cli:example-ssr"

[tasks."cli:example-stats"]
description = "Example: Show only compilation stats (no output files)"
run = "vp run --workspace-root cli:example-stats"

# =============================================================================
# Test
# =============================================================================

[tasks."test:rust"]
alias = "tr"
description = "Run all Rust tests"
run = "vp run --workspace-root test:rust"

[tasks."test:js"]
alias = "tj"
description = "Run JS package tests for bundler integrations"
run = "vp run --workspace-root test:js"

[tasks.test]
alias = "t"
description = "Run Rust and JS tests"
run = "vp run --workspace-root test"

[tasks."test:playground"]
alias = "tp"
description = "Run playground browser tests (vitest)"
run = "vp run --workspace-root test:playground"

[tasks."test:vue"]
alias = "tv"
description = "Run Vue compatibility tests"
run = "vp run --workspace-root test:vue"

[tasks.coverage]
alias = "cov"
description = "Show test coverage report"
run = "vp run --workspace-root coverage"

[tasks."expected:generate"]
alias = "egen"
description = "Generate expected outputs from Vue's official compiler (all modes)"
run = "vp run --workspace-root expected:generate"

[tasks."expected:generate:sfc"]
alias = "egens"
description = "Generate expected outputs for SFC tests"
run = "vp run --workspace-root expected:generate:sfc"

[tasks."expected:generate:vdom"]
alias = "egenv"
description = "Generate expected outputs for VDOM tests"
run = "vp run --workspace-root expected:generate:vdom"

[tasks."expected:generate:vapor"]
alias = "egenp"
description = "Generate expected outputs for Vapor tests"
run = "vp run --workspace-root expected:generate:vapor"

# =============================================================================
# Snapshot Management (TS/JSX/TSX outputs)
# =============================================================================

[tasks.snapshot]
alias = "snap"
description = "Run snapshot tests and review changes"
run = "vp run --workspace-root snapshot"

[tasks."snapshot:test"]
alias = "snapt"
description = "Run snapshot tests only"
run = "vp run --workspace-root snapshot:test"

[tasks."snapshot:review"]
alias = "snapr"
description = "Review pending snapshot changes"
run = "vp run --workspace-root snapshot:review"

[tasks."snapshot:accept"]
alias = "snapa"
description = "Accept all pending snapshot changes"
run = "vp run --workspace-root snapshot:accept"

[tasks."coverage:verbose"]
alias = "covv"
description = "Show coverage with failing test names"
run = "vp run --workspace-root coverage:verbose"

[tasks."coverage:diff"]
alias = "covd"
description = "Show coverage with diffs"
run = "vp run --workspace-root coverage:diff"

# =============================================================================
# Benchmark
# =============================================================================

[tasks.bench]
alias = "b"
description = "Run SFC compile benchmark (run 'mise run build:native' and 'mise run bench:generate' first if needed)"
run = "vp run --workspace-root bench"

[tasks."bench:quick"]
alias = "bq"
description = "Quick benchmark with 1,000 files (single-thread only)"
run = "vp run --workspace-root bench:quick"

[tasks."bench:generate"]
alias = "bg"
description = "Generate 15,000 SFC files for benchmarking"
run = "vp run --workspace-root bench:generate"

[tasks."bench:lint"]
alias = "bl"
description = "Lint benchmark: patina vs eslint-plugin-vue"
run = "vp run --workspace-root bench:lint"

[tasks."bench:fmt"]
alias = "bf"
description = "Format benchmark: glyph vs prettier"
run = "vp run --workspace-root bench:fmt"

[tasks."bench:check"]
alias = "bck"
description = "Type check benchmark: canon vs vue-tsc"
run = "vp run --workspace-root bench:check"

[tasks."bench:vite"]
alias = "bvt"
description = "Vite plugin benchmark: @vizejs/vite-plugin vs @vitejs/plugin-vue"
run = "vp run --workspace-root bench:vite"

[tasks."bench:all"]
alias = "ba"
description = "Run all benchmarks"
run = "vp run --workspace-root bench:all"

[tasks."bench:rust"]
alias = "br"
description = "Run Rust benchmarks (criterion)"
run = "vp run --workspace-root bench:rust"

# =============================================================================
# Development
# =============================================================================

[tasks.dev]
alias = "d"
description = "Start a development target (playground, misskey, npmx, elk, vuefes)"
usage = """
arg "[target]" help="Development target" {
  choices "playground" "misskey" "npmx" "elk" "vuefes"
}

flag "--skip-setup" help="Skip fixture install/setup steps"
flag "--skip-build" help="Skip Vize package builds"
"""
run = "vp run --workspace-root dev:app"

[tasks."dev:playground"]
alias = "dp"
description = "Start playground dev server"
run = "vp run --workspace-root dev:playground"

[tasks."dev:misskey"]
alias = "dm"
description = "Start misskey full dev app (backend proxy + frontend)"
run = "vp run --workspace-root dev:misskey"

[tasks."dev:npmx"]
alias = "dn"
description = "Start npmx.dev fixture app"
run = "vp run --workspace-root dev:npmx"

[tasks."dev:elk"]
alias = "de"
description = "Start elk fixture app"
run = "vp run --workspace-root dev:elk"

[tasks."dev:vuefes"]
alias = "dv"
description = "Start vuefes-2025 fixture app"
run = "vp run --workspace-root dev:vuefes"

[tasks.example]
alias = "e"
description = "Start vite-plugin-vize example dev server"
run = "vp run --workspace-root example"

[tasks.check]
alias = "c"
description = "Run cargo check"
run = "vp run --workspace-root check:rust"

[tasks.clippy]
alias = "cl"
description = "Run Rust clippy lints"
run = "vp run --workspace-root clippy"

[tasks."fmt:rust"]
alias = "fr"
description = "Format Rust code"
run = "vp run --workspace-root fmt:rust"

[tasks."fmt:js"]
alias = "fj"
description = "Format JS/TS code with Vite+"
run = "vp run --workspace-root fmt"

[tasks.fmt]
alias = "f"
description = "Format all code (Rust + JS/TS)"
run = "vp run --workspace-root fmt:all"

[tasks."lint:rust"]
alias = "lr"
description = "Lint Rust code with clippy"
run = "vp run --workspace-root lint:rust"

[tasks."lint:js"]
alias = "lj"
description = "Check JS/TS code with Vite+"
run = "vp run --workspace-root check"

[tasks.lint]
alias = "l"
description = "Lint all code (Rust + JS/TS)"
run = "vp run --workspace-root lint:all"

# =============================================================================
# CI / All checks
# =============================================================================

[tasks.ci]
description = "Run all CI checks (fmt, clippy, test)"
run = "vp run --workspace-root ci"

# =============================================================================
# Release
# =============================================================================

[tasks.release]
alias = "r"
description = "Release new version (mise run release <alpha|patch|minor|major|beta|rc|stable>)"
run = "vp run --workspace-root release"

# =============================================================================
# Publish (Local)
# =============================================================================

[tasks."publish:wasm"]
alias = "pw"
description = "Build and publish @vizejs/wasm to npm"
run = "vp run --workspace-root publish:wasm"

[tasks."publish:native"]
alias = "pn"
description = "Build and publish @vizejs/native to npm (current platform only)"
run = "vp run --workspace-root publish:native"

# NOTE: @vizejs/cli-* platform packages have been removed.
# CLI now uses NAPI-RS bindings via @vizejs/native-* optionalDependencies.

[tasks."publish:vite-plugin"]
alias = "pv"
description = "Build and publish @vizejs/vite-plugin to npm"
run = "vp run --workspace-root publish:vite-plugin"

[tasks."publish:npm"]
alias = "pnpm"
description = "Publish all npm packages"
run = "vp run --workspace-root publish:npm"

[tasks."publish:crates"]
alias = "pc"
description = "Publish all crates to crates.io (in dependency order)"
run = "vp run --workspace-root publish:crates"

[tasks.publish]
alias = "p"
description = "Publish all packages (npm + crates.io)"
run = "vp run --workspace-root publish"
