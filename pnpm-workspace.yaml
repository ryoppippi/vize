packages:
  - "playground"
  - "npm/*"
  - "!npm/vscode-art"
  - "!npm/vscode-vize"
  - "npm/vite-plugin-vize/example"
  - "npm/rspack-vize-plugin/example"
  - "npm/fresco/examples/*"
  - "examples/vite-musea"
  - "docs"
  - "tests"
  - "bench"
catalog:
  vite: npm:@voidzero-dev/vite-plus-core@0.1.15
  vitest: npm:@voidzero-dev/vite-plus-test@0.1.15
